<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jamly</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-lockup">
        <img src="./img/logo.jpg" alt="Jamly logo" class="brand-logo">
        <div class="brand-copy">
          <p class="eyebrow">Band Assistant</p>
          <h1>Jamly</h1>
          <p class="brand-tagline">What you gave me didn't work, but left me with a permanent headache.</p>
        </div>
      </div>
    </header>

    <section class="todo-banner">
      <div class="todo-banner-header">
        <div>
          <p class="eyebrow">Band Schedule</p>
          <h2>事项清单</h2>
        </div>
      </div>
      <form class="todo-form todo-form-inline" id="todo-form">
        <input id="todo-time" type="datetime-local" aria-label="事项时间">
        <input id="todo-text" type="text" placeholder="添加演出、排练、彩排或其他事项" aria-label="事项内容">
        <button class="primary-button" type="submit">新增事项</button>
      </form>
      <p class="support-text" id="todo-status"></p>
      <div class="todo-list todo-list-inline" id="todo-list"></div>
    </section>

    <main class="main-panel">
      <section class="chat-panel">
        <header class="chat-header">
          <div>
            <p class="eyebrow">统一提交入口</p>
            <h2>本周排练时间收集</h2>
          </div>
          <div class="header-actions">
            <button type="button" class="ghost-button" id="clear-member-button">清空本人数据</button>
            <button type="button" class="ghost-button" id="reset-button">开始新的一周</button>
          </div>
        </header>

        <div class="deadline-strip">
          <strong>当前轮次：</strong>
          周一 00:00 到周日 18:00，排练房开放时间为每天 10:00 到 23:00。系统会为每个成员维护本周草稿状态，待定时间也会单独标记。
        </div>

        <div class="chat-messages" id="chat-messages" aria-live="polite"></div>

        <form class="composer" id="composer-form">
          <label class="composer-label" for="message-input">直接输入本周有空时间</label>
          <textarea
            id="message-input"
            rows="3"
            placeholder="例如：我周五晚上约了朋友吃饭，周一下午2点到4点有课，其他时候都可以"
          ></textarea>
          <div class="composer-actions">
            <div class="member-select-wrap composer-member-select">
              <label for="member-select">我是</label>
              <select id="member-select">
                <option value="cold">cold</option>
                <option value="david">david</option>
                <option value="圈">圈</option>
                <option value="星">星</option>
                <option value="小安">小安</option>
                <option value="afai">afai</option>
              </select>
            </div>
            <button type="button" class="ghost-button hold-button" id="voice-button">点击开始说话</button>
            <button type="submit" class="primary-button">提交</button>
          </div>
          <p class="support-text" id="voice-support"></p>
        </form>
      </section>

      <section class="summary-panel">
        <div class="summary-card">
          <div class="summary-header">
            <div>
              <p class="eyebrow">Band Library</p>
              <h2>Tabs</h2>
            </div>
          </div>
          <div class="tabs-panel">
            <div class="tabs-toolbar">
              <button type="button" class="ghost-button tabs-back-button" id="tabs-back-button" hidden>返回歌单</button>
              <div class="support-text" id="tabs-breadcrumb">曲谱总表</div>
            </div>
            <div class="tabs-list" id="tabs-list"></div>
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-header">
            <div>
              <p class="eyebrow">当前汇总</p>
              <h2>全员时间交集</h2>
            </div>
          </div>
          <div class="summary-content" id="summary-content"></div>
        </div>

        <div class="summary-card">
          <div class="summary-header">
            <div>
              <p class="eyebrow">成员状态</p>
              <h2>提交概览</h2>
            </div>
          </div>
          <div id="status-content" class="status-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
